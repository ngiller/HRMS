<!doctype html>
<html lang="id">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#1A56DB" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#111827" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="HRMS" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="application-name" content="HRMS" />
		<meta name="format-detection" content="telephone=no" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="apple-touch-icon" href="/icons/icon-512.svg" sizes="512x512" />
		<link rel="apple-touch-icon" href="/icons/icon-192.svg" sizes="192x192" />
		<link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
		%sveltekit.head%
		<script>
			const isDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
			if ('serviceWorker' in navigator) {
				if (isDev) {
					// Bersihkan service worker lama dari sesi development sebelumnya
					navigator.serviceWorker.getRegistrations().then(regs => {
						regs.forEach(reg => reg.unregister());
					});
				} else {
					// Register Service Worker (production only)
					window.addEventListener('load', () => {
						navigator.serviceWorker.register('/service-worker.js').then(
							(registration) => {
								console.log('[PWA] ServiceWorker registered:', registration.scope);
							},
							(err) => {
								console.log('[PWA] ServiceWorker registration failed:', err);
							}
						);
					});

					// Listen for beforeinstallprompt
					let deferredPrompt;
					window.addEventListener('beforeinstallprompt', (e) => {
						e.preventDefault();
						deferredPrompt = e;
						window.__pwaDeferredPrompt = e;
						window.dispatchEvent(new CustomEvent('pwa-install-available'));
					});

					// Listen for app installed
					window.addEventListener('appinstalled', () => {
						window.__pwaDeferredPrompt = null;
						window.dispatchEvent(new CustomEvent('pwa-installed'));
						console.log('[PWA] App was installed.');
					});
				}
			}
		</script>
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-gray-50 text-gray-900 antialiased">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
